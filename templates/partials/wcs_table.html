{% if wcs and wcs|length > 0 %}
<div class="w-full">
  <table class="w-full border-collapse">
     {% for i in range(0, wcs | length, 2) %}
     <tr>
       <td class="p-2 w-1/2">
         <div class="flex items-center gap-3 bg-slate-50 rounded-lg px-4 py-3 border border-slate-200 hover:shadow-md transition-shadow">
           <button class="sensor-btn status-{{ wcs[i].STATUS|lower }} {% if wcs[i].STATUS == 'WARN' %}pulse-warn{% elif wcs[i].STATUS == 'CRITICAL' %}pulse-critical{% endif %} flex-shrink-0"
                   data-dcp-name="{{ wcs[i].DCP_NAME }}"
                   data-description="{{ wcs[i].DESCRIPTION }}"
                   data-location="{{ wcs[i].LOCATION }}"
                   data-status="{{ wcs[i].STATUS }}"></button>
           <div class="flex flex-col min-w-0 flex-1">
             <span class="text-base font-semibold text-slate-800">{{ wcs[i].LINE }}</span>
             <span class="text-xs text-muted truncate">{{ wcs[i].DESCRIPTION }}</span>
           </div>
         </div>
       </td>
       {% if wcs[i + 1] is defined %}
       <td class="p-2 w-1/2">
         <div class="flex items-center gap-3 bg-slate-50 rounded-lg px-4 py-3 border border-slate-200 hover:shadow-md transition-shadow">
           <button class="sensor-btn status-{{ wcs[i+1].STATUS|lower }} {% if wcs[i+1].STATUS == 'WARN' %}pulse-warn{% elif wcs[i+1].STATUS == 'CRITICAL' %}pulse-critical{% endif %} flex-shrink-0"
                   data-dcp-name="{{ wcs[i+1].DCP_NAME }}"
                   data-description="{{ wcs[i+1].DESCRIPTION }}"
                   data-location="{{ wcs[i+1].LOCATION }}"
                   data-status="{{ wcs[i+1].STATUS }}"></button>
           <div class="flex flex-col min-w-0 flex-1">
             <span class="text-base font-semibold text-slate-800">{{ wcs[i+1].LINE }}</span>
             <span class="text-xs text-muted truncate">{{ wcs[i+1].DESCRIPTION }}</span>
           </div>
         </div>
       </td>
       {% else %}
       <td class="p-2 w-1/2"></td>
       {% endif %}
     </tr>
     {% endfor %}
  </table>
</div>
{% else %}
<div class="text-center py-8 text-muted">
  <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4M12 20V4"></path>
  </svg>
  <p class="text-lg">No WCS data available</p>
</div>
{% endif %}
