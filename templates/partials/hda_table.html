<table class="w-full border-collapse">
  <tr>
    <th class="text-left font-bold text-muted uppercase sticky left-0 bg-white">Lines</th>
    {% for col in hda.cols %}
    <th class="font-semibold text-slate-500 whitespace-nowrap">STN{{ col }}</th>
    {% endfor %}
  </tr>
  {% for row in hda.rows %}
  <tr class="border-b border-slate-50 last:border-0">
    <td class="row-label sticky left-0 bg-white">{{ row }}</td>
    {% for col in hda.cols %}
    {% set status = hda.data[row][col] %}
    {% set detail_key = row + '_' + col %}
    {% set detail = hda.details.get(detail_key, {}) %}
    <td class="text-center py-1.5">
       <button class="sensor-btn status-{{ status|lower }} {% if status == 'WARN' %}pulse-warn{% elif status == 'CRITICAL' %}pulse-critical{% endif %}"
               data-dcp-name="{{ detail.get('dcp_name', 'N/A') }}"
               data-description="{{ detail.get('description', 'N/A') }}"
               data-location="{{ detail.get('location', 'N/A') }}"
               data-status="{{ status }}"></button>
    </td>
    {% endfor %}
  </tr>
  {% endfor %}
</table>
