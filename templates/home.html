<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewstation - Home</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='red' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'></circle><path d='M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.724 1.724 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.724 1.724 0 0 0 1.82.33H9a1.724 1.724 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.724 1.724 0 0 0 1 1.51 1.724 1.724 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.724 1.724 0 0 0-.33 1.82V9a1.724 1.724 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.724 1.724 0 0 0-1.51 1z'></path></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Chart.js and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            bg: '#f8f9fa', card: '#ffffff', border: '#e5e7eb', accent: '#dc2626',
            'accent-hover': '#b91c1c', muted: '#6b7280', fg: '#111827',
            status: { ok: '#16a34a', warn: '#d97706', critical: '#dc2626', stale: '#6b7280', unknown: '#9ca3af' }
          }
        }
      }
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f8f9fa;
    }

    .stat-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      user-select: none;
      position: relative;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .stat-card.active {
      box-shadow: 0 0 0 2px #dc2626;
    }

    /* Tooltip Styles - matching dashboard.html */
    .stat-tooltip {
      position: fixed;
      background: white;
      border: 1px solid #e5e7eb;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111827;
      pointer-events: none;
      z-index: 1000;
      display: none;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      border-left: 3px solid #dc2626;
      max-width: 340px;
      min-width: 280px;
    }

    .stat-tooltip h4 {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 1rem;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 4px;
    }

    .stat-tooltip .process-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 0.85rem;
    }

    .stat-tooltip .process-name {
      font-weight: 500;
      color: #374151;
    }

    .stat-tooltip .process-count {
      font-weight: 600;
      color: #dc2626;
    }

    .stat-tooltip .total-row {
      border-top: 1px solid #e5e7eb;
      margin-top: 6px;
      padding-top: 6px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
    }

    .stat-tooltip .total-label {
      font-weight: 700;
      color: #111827;
    }

    .stat-tooltip .total-value {
      font-weight: 800;
      color: #dc2626;
      font-size: 1rem;
    }

    /* Very Light Blue Theme for Table */
    .table-row-hover:hover {
      background-color: #e0f2fe !important;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }

    .status-badge {
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    /* Alternating row colors - Light blue shades */
    tbody tr:nth-child(even) {
      background-color: #f0f9ff;
      /* Very light blue */
    }

    tbody tr:nth-child(odd) {
      background-color: #f8fafc;
      /* Off-white with slight blue tint */
    }

    /* Better number alignment */
    .number-cell {
      font-family: 'Inter', monospace;
      font-weight: 500;
      text-align: center;
    }

    /* Status badge enhancements - Keep original colors for status badges */
    .badge-active {
      background: #dcfce7;
      color: #166534;
      border-left: 3px solid #22c55e;
    }

    .badge-l1 {
      background: #fef9c3;
      color: #854d0e;
      border-left: 3px solid #eab308;
    }

    .badge-l2 {
      background: #ffedd5;
      color: #9a3412;
      border-left: 3px solid #f97316;
    }

    .badge-stop {
      background: #fee2e2;
      color: #991b1b;
      border-left: 3px solid #ef4444;
    }

    .badge-stale {
      background: #f3f4f6;
      color: #374151;
      border-left: 3px solid #6b7280;
    }

    /* Table header enhancement - Blue theme */
    .table-header th {
      background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
      border-bottom: 2px solid #bfdbfe;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: #1e40af;
      padding: 14px 16px;
      border-top: 1px solid #bfdbfe;
    }

    /* Row dividers - Light blue */
    tbody tr {
      border-bottom: 1px solid #e2e8f0;
    }

    /* Table container border - Blue tint */
    .table-container {
      border: 1px solid #dbeafe;
      border-radius: 12px;
      overflow: hidden;
    }

    /* ID column styling */
    .id-cell {
      font-weight: 700;
      color: #1e40af;
      background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%);
    }

    /* Process column pill */
    .process-pill {
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
    }

    /* Number cells background */
    .number-cell-bg {
      background: #f8fafc;
      border-radius: 6px;
      padding: 2px 6px;
      display: inline-block;
      min-width: 40px;
    }

    /* Description cell */
    .desc-cell {
      color: #334155;
      font-weight: 500;
      max-width: 250px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>

<body class="bg-bg text-fg min-h-screen">

  <!-- Navbar -->
  <nav class="bg-card border-b border-border px-4 py-2.5 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-accent rounded flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
          </path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z">
          </path>
        </svg>
      </div>
      <h1 class="font-sans font-bold tracking-tight text-accent text-xl">Viewstation</h1>
    </div>

    <div class="flex items-center gap-4">
      <a href="/dashboard"
        class="text-accent hover:text-accent-hover transition-colors font-bold underline underline-offset-4">Dashboard</a>
      <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-full">
        <span class="text-muted text-sm">Updated:</span>
        <span id="lastUpdate" class="font-semibold text-fg text-sm">--:--:--</span>
      </div>

  </nav>

  <main class="p-6 max-w-7xl mx-auto">

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-6">
      <!-- Total Inventory (Toggles Table) -->
      <div id="cardTotal"
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="all" data-card-type="total">
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4">
            </path>
          </svg>
        </div>
        <span class="text-2xl font-bold text-gray-800" id="textTotal">0</span>
        <span class="text-sm text-gray-500 font-medium">Total Inventory</span>
      </div>

      <!-- ACTIVE (Good + Stop + L1 + L2) -->
      <div
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="status" data-value="active" data-card-type="active">
        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <span class="text-2xl font-bold text-green-600" id="textActive">0</span>
        <span class="text-sm text-gray-500 font-medium">ACTIVE</span>
      </div>

      <!-- Stale -->
      <div
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="status" data-value="4" data-card-type="stale">
        <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <span class="text-2xl font-bold text-gray-500" id="textStale">0</span>
        <span class="text-sm text-gray-500 font-medium">Stale</span>
      </div>

      <!-- Check L1 -->
      <div
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="accumulated" data-value="l1" data-card-type="l1">
        <div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
            </path>
          </svg>
        </div>
        <span class="text-2xl font-bold text-yellow-600" id="textL1">0</span>
        <span class="text-sm text-gray-500 font-medium">Check L1</span>
      </div>

      <!-- Check L2 -->
      <div
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="accumulated" data-value="l2" data-card-type="l2">
        <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <span class="text-2xl font-bold text-orange-600" id="textL2">0</span>
        <span class="text-sm text-gray-500 font-medium">Check L2</span>
      </div>

      <!-- Stop -->
      <div
        class="stat-card bg-white p-4 rounded-lg border border-gray-200 shadow-sm flex flex-col items-center justify-center"
        data-filter="accumulated" data-value="stop" data-card-type="stop">
        <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center mb-2">
          <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>

        </div>

    </div>

    <!-- Filters & Table Section (Wrapped for Toggle) -->
    <div id="tableWrapper">
      <div
        class="bg-white rounded-lg shadow-md border border-blue-200 p-4 mb-6 hover:shadow-lg transition-shadow duration-300 table-container">
        <div class="flex flex-wrap gap-4 mb-4 items-center justify-between border-b pb-4">
          <div class="flex gap-4 items-center">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Location</label>
              <select id="filterLocation"
                class="block w-full pl-3 pr-10 py-2 text-base border-blue-200 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border bg-white">
                <option value="all">All Locations</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Process</label>
              <select id="filterProcess"
                class="block w-full pl-3 pr-10 py-2 text-base border-blue-200 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border bg-white">
                <option value="all">All Processes</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Show entries</label>
            <select id="pageSize"

              <option value="25">25</option>

              <option value="100">100</option>

        <!-- Table -->
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="table-header">
              <tr>
                <th class="px-4 py-3 text-left rounded-tl-lg">📌 ID</th>
                <th class="px-4 py-3 text-left">📝 Description</th>
                <th class="px-4 py-3 text-left">📍 Location</th>
                <th class="px-4 py-3 text-left">⚙️ Process</th>
                <th class="px-4 py-3 text-left">🔢 Line</th>
                <th class="px-4 py-3 text-left">📊 Status</th>
                <th class="px-4 py-3 text-center">🛑 Stop Cnt</th>
                <th class="px-4 py-3 text-center">⚠️ L1</th>
                <th class="px-4 py-3 text-center">⚠️ L2</th>

        </div>
      </div>
    </div>

    <!-- Sensor Graph Section (hidden by default) -->
    <div id="graphSection" class="mt-6 hidden bg-white rounded-lg shadow-md border border-blue-200 p-4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold text-gray-700">
          📈 Sensor: <span id="currentSensorId" class="text-accent font-mono"></span>
        </h3>
        <div class="flex gap-4 items-center">
          <div>
            <label class="text-xs text-gray-500 block">Start</label>
            <input type="datetime-local" id="graphStart" class="border rounded px-2 py-1 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500 block">End</label>
            <input type="datetime-local" id="graphEnd" class="border rounded px-2 py-1 text-sm">
          </div>
          <button id="applyGraphRange"
            class="bg-accent text-white px-3 py-1 rounded text-sm hover:bg-accent-hover">Apply</button>
          <button id="copyChartBtn" class="bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-300">📋
            Copy Chart</button>
          <button id="closeGraphBtn" class="text-gray-500 hover:text-gray-700 text-xl leading-5">&times;</button>
        </div>
      </div>
      <div class="relative" style="height: 300px;">
        <canvas id="sensorChart"></canvas>
      </div>
      <div id="graphLoading" class="text-center py-8 text-gray-500 hidden">Loading data...</div>
      <div id="graphError" class="text-center py-8 text-red-500 hidden"></div>
    </div>
    <!-- Temporary JPEG Section -->
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4">
      <h3 class="text-lg font-semibold text-gray-700 mb-3">Reference Layout</h3>
      <div
        class="bg-gray-100 border-dashed border-2 border-gray-300 rounded h-64 flex items-center justify-center text-gray-400">
        <img src="https://via.placeholder.com/800x300?text=Temporary+JPEG+Placeholder" alt="Placeholder"
          class="max-h-full object-contain rounded">
      </div>
    </div>

  </main>

  <!-- Tooltip -->
  <div id="statTooltip" class="stat-tooltip"></div>

  <script>
    $(document).ready(function () {
      let allData = [];
      let filteredData = [];
      let currentPage = 1;
      let pageSize = 10;
      let activeStatusFilter = 'all';
      let activeAccumulatedFilter = null;
      // Add after existing variables
      let chartInstance = null;
      let currentSensor = null;
      let currentSensorDesc = '';
      // Row click handler (delegated)
      $('#tableBody').on('click', 'tr', function () {
        const idCell = $(this).find('td:first-child span').text();
        if (idCell && idCell !== 'N/A') {
          // Find description from the loaded data
          const sensorData = allData.find(item => item.id === idCell);
          const description = sensorData ? sensorData.desc : idCell;
          openSensorGraph(idCell, description);
        }
      });

      function openSensorGraph(sensorId, description) {
        currentSensor = sensorId;
        currentSensorDesc = description;
        $('#currentSensorId').text(sensorId);           // Keep ID in header
        $('#currentSensorDesc').text(description);      // Show description in a new span
        $('#graphSection').removeClass('hidden');

        // Set default date range
        const now = new Date();
        const yesterday = new Date(now.getTime() - 24 * 60 * 60 * 1000);
        $('#graphStart').val(formatDateTimeLocal(yesterday));
        $('#graphEnd').val(formatDateTimeLocal(now));

        loadSensorData();
      }

      function formatDateTimeLocal(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = '00';  // Force minutes to 00 for hour-level precision
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function loadSensorData() {
        if (!currentSensor) return;

        const start = $('#graphStart').val();
        const end = $('#graphEnd').val();
        let url = `/api/sensor/${encodeURIComponent(currentSensor)}/data`;
        const params = new URLSearchParams();
        if (start) params.append('start', start);
        if (end) params.append('end', end);
        if (params.toString()) url += '?' + params.toString();

        $('#graphLoading').removeClass('hidden');
        $('#graphError').addClass('hidden');
        $('#sensorChart').addClass('hidden');

        $.getJSON(url)
          .done(function (response) {
            $('#graphLoading').addClass('hidden');
            $('#sensorChart').removeClass('hidden');
            renderChart(response.times, response.values, currentSensorDesc);  // ← Pass sensor ID
          })
          .fail(function (xhr) {
            $('#graphLoading').addClass('hidden');
            $('#graphError').removeClass('hidden').text('Error loading data: ' +
              (xhr.responseJSON?.error || 'Unknown error'));
          });
      }
      function renderChart(labels, values, description) {
        const ctx = document.getElementById('sensorChart').getContext('2d');

        // Destroy existing chart instance if any
        if (chartInstance) {
          chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: description,                     // This won't show since legend is hidden
              data: values,
              borderColor: '#2563eb',
              backgroundColor: 'rgba(37, 99, 235, 0.1)',
              borderWidth: 2,
              pointRadius: 0,
              tension: 0.1,
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: false                       // ← Hide the legend
              },
              title: {
                display: true,
                text: description,                   // Description as chart title
                font: { size: 16, weight: 'bold' },
                padding: { top: 10, bottom: 10 }
              },
              annotation: {
                annotations: {
                  threshold5: {
                    type: 'line',
                    yMin: 5,
                    yMax: 5,
                    borderColor: '#eab308',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                      content: 'Threshold 5',
                      enabled: true,
                      position: 'end',
                      backgroundColor: '#eab308'
                    }
                  },
                  threshold20: {
                    type: 'line',
                    yMin: 20,
                    yMax: 20,
                    borderColor: '#dc2626',
                    borderWidth: 2,
                    borderDash: [5, 5],
                    label: {
                      content: 'Threshold 20',
                      enabled: true,
                      position: 'end',
                      backgroundColor: '#dc2626'
                    }
                  }
                }
              }
            },
            scales: {
              x: {
                type: 'time',
                time: {
                  unit: 'hour',                    // ← Base unit: hour
                  displayFormats: {
                    hour: 'yyyy-MM-dd HH:00'     // ← Format: Year-Month-Day Hour
                  },
                  tooltipFormat: 'yyyy-MM-dd HH:mm'
                },
                title: {
                  display: true,
                  text: 'Time'
                }
              },
              y: {
                min: 0,
                max: 100,
                title: {
                  display: true,
                  text: 'Value'
                }
              }
            }
          }
        });
      }
      // Apply button
      $('#applyGraphRange').on('click', loadSensorData);

      // Close graph
      $('#closeGraphBtn').on('click', function () {
        $('#graphSection').addClass('hidden');
        if (chartInstance) {
          chartInstance.destroy();
          chartInstance = null;
        }
        currentSensor = null;
      });

      // Copy chart as image
      $('#copyChartBtn').on('click', async function () {
        const canvas = document.getElementById('sensorChart');
        if (!canvas) return;

        try {
          // Convert canvas to blob
          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
          await navigator.clipboard.write([
            new ClipboardItem({
              [blob.type]: blob
            })
          ]);
          alert('Chart copied to clipboard!');
        } catch (err) {
          console.error('Copy failed:', err);
          alert('Could not copy chart. You may need to grant clipboard permissions.');
        }
      });


      function getStatusColor(code) {
        if (code === 0) return 'badge-active';
        if (code === 1) return 'badge-l1';
        if (code === 2) return 'badge-l2';
        if (code === 3) return 'badge-stop';
        if (code === 4) return 'badge-stale';
        return 'bg-gray-100 text-gray-800';
      }

      function getStatusText(code) {
        if (code === 0) return 'ACTIVE';
        if (code === 1) return 'CHECK L1';
        if (code === 2) return 'CHECK L2';
        if (code === 3) return 'STOP';
        if (code === 4) return 'STALE';
        return 'UNKNOWN';
      }

      function flattenData(dataMap) {
        let list = [];
        for (let key in dataMap) {
          let val = dataMap[key];
          if (Array.isArray(val)) {
            list = list.concat(val);
          } else if (typeof val === 'object' && val !== null) {
            if (val.id) list.push(val);
          }
        }
        return list;
      }

      // Get accumulated sums for tooltip (for L1, L2, STOP)
      function getAccumulatedSumsForCard(cardType) {
        let processSums = {};
        let totalSum = 0;

        allData.forEach(item => {
          let process = item.process || 'Unknown';
          let value = 0;

          if (cardType === 'l1') {
            value = parseInt(item.l1) || 0;
          } else if (cardType === 'l2') {
            value = parseInt(item.l2) || 0;
          } else if (cardType === 'stop') {
            value = parseInt(item.stop) || 0;
          }

          if (value > 0) {
            processSums[process] = (processSums[process] || 0) + value;
            totalSum += value;
          }
        });

        return { processSums, totalSum };
      }

      // Get count of items for tooltip (for Total Inventory, ACTIVE, STALE)
      function getItemCountsForCard(cardType) {
        let processCounts = {};
        let totalCount = 0;

        allData.forEach(item => {
          let process = item.process || 'Unknown';
          let include = false;

          if (cardType === 'total') {
            include = true;
          } else if (cardType === 'active') {
            const statusCode = parseInt(item.status_code);
            include = (statusCode === 0 || statusCode === 1 || statusCode === 2 || statusCode === 3);
          } else if (cardType === 'stale') {
            include = (parseInt(item.status_code) === 4);
          }

          if (include) {
            processCounts[process] = (processCounts[process] || 0) + 1;
            totalCount++;
          }
        });

        return { processCounts, totalCount };
      }

      // Tooltip handlers
      const $tooltip = $('#statTooltip');

      function updateTooltipPosition(e) {
        const tw = $tooltip.outerWidth(), th = $tooltip.outerHeight();
        const ww = $(window).width(), wh = $(window).height();
        let left = e.clientX + 15, top = e.clientY + 15;
        if (left + tw > ww - 10) left = e.clientX - tw - 15;
        if (left < 10) left = 10;
        if (top + th > wh - 10) top = e.clientY - th - 15;
        if (top < 10) top = 10;
        $tooltip.css({ left, top });
      }

      $(document).on('mouseenter', '.stat-card', function (e) {
        const $card = $(this);
        const cardType = $card.data('card-type');
        const cardValue = $card.find('span:first-of-type').text().trim();

        let titleText = '';
        let tooltipHtml = '';

        // Handle L1, L2, STOP cards (show sums)
        if (cardType === 'l1') {
          const { processSums, totalSum } = getAccumulatedSumsForCard('l1');
          titleText = `⚠️ CHECK L1 Total Counts by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processSums).sort();

          if (sortedProcesses.length === 0) {
            tooltipHtml += '<div class="process-item"><span class="process-name">No data available</span><span class="process-count">0</span></div>';
          } else {
            sortedProcesses.forEach(process => {
              tooltipHtml += `
                <div class="process-item">
                  <span class="process-name">${process}</span>
                  <span class="process-count">${processSums[process]}</span>
                </div>
              `;
            });
          }

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL CHECK L1</span>
              <span class="total-value">${totalSum}</span>
            </div>
          `;
        }
        else if (cardType === 'l2') {
          const { processSums, totalSum } = getAccumulatedSumsForCard('l2');
          titleText = `⚠️ CHECK L2 Total Counts by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processSums).sort();

          if (sortedProcesses.length === 0) {
            tooltipHtml += '<div class="process-item"><span class="process-name">No data available</span><span class="process-count">0</span></div>';
          } else {
            sortedProcesses.forEach(process => {
              tooltipHtml += `
                <div class="process-item">
                  <span class="process-name">${process}</span>
                  <span class="process-count">${processSums[process]}</span>
                </div>
              `;
            });
          }

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL CHECK L2</span>
              <span class="total-value">${totalSum}</span>
            </div>
          `;
        }
        else if (cardType === 'stop') {
          const { processSums, totalSum } = getAccumulatedSumsForCard('stop');
          titleText = `🛑 STOP Total Counts by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processSums).sort();

          if (sortedProcesses.length === 0) {
            tooltipHtml += '<div class="process-item"><span class="process-name">No data available</span><span class="process-count">0</span></div>';
          } else {
            sortedProcesses.forEach(process => {
              tooltipHtml += `
                <div class="process-item">
                  <span class="process-name">${process}</span>
                  <span class="process-count">${processSums[process]}</span>
                </div>
              `;
            });
          }

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL STOP</span>
              <span class="total-value">${totalSum}</span>
            </div>
          `;
        }
        // Handle Total Inventory, ACTIVE, STALE cards (show item counts)
        else if (cardType === 'total') {
          const { processCounts, totalCount } = getItemCountsForCard('total');
          titleText = `📊 Total Inventory by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processCounts).sort();

          sortedProcesses.forEach(process => {
            tooltipHtml += `
              <div class="process-item">
                <span class="process-name">${process}</span>
                <span class="process-count">${processCounts[process]}</span>
              </div>
            `;
          });

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL ITEMS</span>
              <span class="total-value">${totalCount}</span>
            </div>
          `;
        }
        else if (cardType === 'active') {
          const { processCounts, totalCount } = getItemCountsForCard('active');
          titleText = `✅ ACTIVE Items by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processCounts).sort();

          sortedProcesses.forEach(process => {
            tooltipHtml += `
              <div class="process-item">
                <span class="process-name">${process}</span>
                <span class="process-count">${processCounts[process]}</span>
              </div>
            `;
          });

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL ACTIVE</span>
              <span class="total-value">${totalCount}</span>
            </div>
          `;
        }
        else if (cardType === 'stale') {
          const { processCounts, totalCount } = getItemCountsForCard('stale');
          titleText = `⏰ STALE Items by Process`;
          tooltipHtml = `<h4>${titleText}</h4>`;

          const sortedProcesses = Object.keys(processCounts).sort();

          sortedProcesses.forEach(process => {
            tooltipHtml += `
              <div class="process-item">
                <span class="process-name">${process}</span>
                <span class="process-count">${processCounts[process]}</span>
              </div>
            `;
          });

          tooltipHtml += `
            <div class="total-row">
              <span class="total-label">📋 TOTAL STALE</span>
              <span class="total-value">${totalCount}</span>
            </div>
          `;
        }

        $tooltip.html(tooltipHtml);
        $tooltip.css({ display: 'block' });
        updateTooltipPosition(e);
      });

      $(document).on('mousemove', '.stat-card', updateTooltipPosition);
      $(document).on('mouseleave', '.stat-card', () => $tooltip.css('display', 'none'));

      function loadData() {
        $.get('/api/data', function (response) {
          allData = flattenData(response);
          populateFilters();
          applyFilters();
          updateTimestamp();
        }).fail(function (error) {
          console.error('Error loading data:', error);
        });
      }

      function populateFilters() {
        const locations = new Set();
        const processes = new Set();

        allData.forEach(item => {
          if (item.loc) locations.add(item.loc);
          if (item.process) processes.add(item.process);
        });

        const locSelect = $('#filterLocation');
        locSelect.empty().append('<option value="all">All Locations</option>');
        [...locations].sort().forEach(loc => {
          locSelect.append(`<option value="${loc}">${loc}</option>`);
        });

        const procSelect = $('#filterProcess');
        procSelect.empty().append('<option value="all">All Processes</option>');
        [...processes].sort().forEach(proc => {
          procSelect.append(`<option value="${proc}">${proc}</option>`);
        });
      }

      function calculateStats() {
        let total = allData.length;
        let activeCount = 0, stale = 0;
        let stopSum = 0, l1Sum = 0, l2Sum = 0;

        allData.forEach(item => {
          const statusCode = parseInt(item.status_code);

          // ACTIVE count includes: GOOD(0), STOP(3), CHECK L1(1), CHECK L2(2)
          if (statusCode === 0 || statusCode === 1 || statusCode === 2 || statusCode === 3) {
            activeCount++;
          }
          if (statusCode === 4) stale++;

          // Sum for display on cards
          l1Sum += (parseInt(item.l1) || 0);
          l2Sum += (parseInt(item.l2) || 0);
          stopSum += (parseInt(item.stop) || 0);
        });

        $('#textTotal').text(total);
        $('#textActive').text(activeCount);
        $('#textStale').text(stale);
        $('#textL1').text(l1Sum);
        $('#textL2').text(l2Sum);
        $('#textStop').text(stopSum);
      }

      function applyFilters() {
        const locFilter = $('#filterLocation').val();
        const procFilter = $('#filterProcess').val();

        filteredData = allData.filter(item => {
          const matchLoc = (locFilter === 'all' || item.loc === locFilter);
          const matchProc = (procFilter === 'all' || item.process === procFilter);

          let matchStatus = true;
          if (activeStatusFilter === 'active') {
            // ACTIVE includes status codes 0, 1, 2, 3
            const statusCode = parseInt(item.status_code);
            matchStatus = (statusCode === 0 || statusCode === 1 || statusCode === 2 || statusCode === 3);
          } else if (activeStatusFilter !== 'all' && activeStatusFilter !== null) {
            matchStatus = (parseInt(item.status_code) === parseInt(activeStatusFilter));
          }

          // Apply accumulated filter (stop, l1, l2 >= 1)
          let matchAccumulated = true;
          if (activeAccumulatedFilter === 'stop') {
            matchAccumulated = (parseInt(item.stop) || 0) >= 1;
          } else if (activeAccumulatedFilter === 'l1') {
            matchAccumulated = (parseInt(item.l1) || 0) >= 1;
          } else if (activeAccumulatedFilter === 'l2') {
            matchAccumulated = (parseInt(item.l2) || 0) >= 1;
          }

          return matchLoc && matchProc && matchStatus && matchAccumulated;
        });

        calculateStats();
        currentPage = 1;
        renderTable();
      }

      function renderTable() {
        const tbody = $('#tableBody');
        tbody.empty();

        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = filteredData.slice(start, end);

        if (pageData.length === 0) {
          tbody.append('<tr><td colspan="10" class="text-center py-4 text-gray-500">No data found</td></tr>');
        } else {
          pageData.forEach(item => {
            const row = `
  <tr class="table-row-hover">
    <td class="px-4 py-3 whitespace-nowrap text-sm id-cell">
      <span class="font-bold">${item.id || 'N/A'}</span>
    </td>
    <td class="px-4 py-3 text-sm desc-cell" title="${item.desc || 'N/A'}">
      <span class="desc-cell">${item.desc || 'N/A'}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">
      <span class="font-medium">${item.loc || 'N/A'}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm">
      <span class="process-pill">${item.process || 'N/A'}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-gray-600">
      <span class="font-mono">${item.line_no || 'N/A'}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm">
      <span class="px-3 py-1 inline-flex text-xs leading-5 font-bold rounded-md status-badge ${getStatusColor(item.status_code)}">
        ${getStatusText(item.status_code)}
      </span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-center">
      <span class="number-cell-bg text-gray-700">${item.stop || 0}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-center">
      <span class="number-cell-bg text-amber-700 font-bold">${item.l1 || 0}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-center">
      <span class="number-cell-bg text-orange-700 font-bold">${item.l2 || 0}</span>
    </td>
    <td class="px-4 py-3 whitespace-nowrap text-sm text-center">
      <span class="number-cell-bg text-gray-700 font-semibold">${item.average || 0}</span>
    </td>
  </tr>
`;
            tbody.append(row);
          });
        }

        updatePaginationInfo();
      }

      function updatePaginationInfo() {
        const total = filteredData.length;
        const start = total === 0 ? 0 : (currentPage - 1) * pageSize + 1;
        const end = Math.min(currentPage * pageSize, total);

        $('#showingStart').text(start);
        $('#showingEnd').text(end);
        $('#totalEntries').text(total);

        const totalPages = Math.ceil(total / pageSize) || 1;
        $('#pageInfo').text(`Page ${currentPage} of ${totalPages}`);

        $('#prevPage').prop('disabled', currentPage === 1);
        $('#nextPage').prop('disabled', currentPage >= totalPages);
      }

      function updateTimestamp() {
        $('#lastUpdate').text(new Date().toLocaleTimeString());
      }

      // Filter Listeners
      $('#filterLocation, #filterProcess').change(function () {
        applyFilters();
      });

      $('#pageSize').change(function () {
        pageSize = parseInt($(this).val());
        currentPage = 1;
        renderTable();
      });

      $('#prevPage').click(function () {
        if (currentPage > 1) {
          currentPage--;
          renderTable();
        }
      });

      $('#nextPage').click(function () {
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (currentPage < totalPages) {
          currentPage++;
          renderTable();
        }
      });

      // Card Click Logic
      $('.stat-card').click(function () {
        const filterType = $(this).data('filter');
        const filterValue = $(this).data('value');
        const cardType = $(this).data('card-type');

        // Total Inventory Click: Toggle Table
        if (filterType === 'all') {
          $('#tableWrapper').toggleClass('hidden');
          $(this).toggleClass('active');
          // Reset filters when toggling total inventory
          activeAccumulatedFilter = null;
          activeStatusFilter = 'all';
          $('.stat-card[data-filter="status"], .stat-card[data-filter="accumulated"]').removeClass('active');
          applyFilters();
          return;
        }

        // Ensure table is visible
        if ($('#tableWrapper').hasClass('hidden')) {
          $('#tableWrapper').removeClass('hidden');
        }

        $('#cardTotal').removeClass('active');

        // Handle accumulated filter cards (Stop, Check L1, Check L2)
        if (filterType === 'accumulated') {
          if ($(this).hasClass('active')) {
            $(this).removeClass('active');
            activeAccumulatedFilter = null;
          } else {
            // Remove active from other accumulated filter cards
            $('.stat-card[data-filter="accumulated"]').removeClass('active');
            // Remove active from status filter cards
            $('.stat-card[data-filter="status"]').removeClass('active');
            $(this).addClass('active');
            activeAccumulatedFilter = filterValue;
            activeStatusFilter = 'all'; // Reset status filter
          }
          applyFilters();
        }
        // Handle status filter cards (ACTIVE, STALE)
        else if (filterType === 'status') {
          // Remove active from accumulated filter cards
          $('.stat-card[data-filter="accumulated"]').removeClass('active');
          activeAccumulatedFilter = null;

          if ($(this).hasClass('active')) {
            $(this).removeClass('active');
            activeStatusFilter = 'all';
          } else {
            $('.stat-card[data-filter="status"]').removeClass('active');
            $(this).addClass('active');
            activeStatusFilter = filterValue;
          }
          applyFilters();
        }
      });

      // Initial Load 
      loadData();
      setInterval(updateTimestamp, 1000); // Only timestamp updates every second
    });
  </script>
</body>

</html>
