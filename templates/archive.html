    <style>
        body {

            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;

    <script>
        $(document).ready(function () {
            // ---------- State ----------
            let allData = [];
            let filteredData = [];
            let currentPage = 1;
            let pageSize = 10;
            let activeStatusFilter = 'all';
            let tableSearchTerm = '';
            let dateSortOrder = 'asc';       // 'asc' or 'desc'
            let activeProcessFilter = 'all';
            let activeShiftFilter = 'all';   // 'all', 'DS', 'NS'

            // Inventory map DCP Name → Process
            let dcpProcessMap = {};

            // ---------- Helper: Parse date_time ----------
            function parseDateTime(dateTimeStr) {
                if (!dateTimeStr) return new Date(0);
                if (/^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}$/.test(dateTimeStr)) {
                    const parts = dateTimeStr.split(' ');
                    const dParts = parts[0].split('/');
                    const tParts = parts[1].split(':');
                    return new Date(parseInt(dParts[2]), parseInt(dParts[1]) - 1, parseInt(dParts[0]), parseInt(tParts[0]), parseInt(tParts[1]));
                }
                if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(dateTimeStr)) {
                    return new Date(dateTimeStr.replace(' ', 'T'));
                }
                return new Date(dateTimeStr);
            }

            // ---------- Set default date (today) ----------
            function setDefaultDate() {
                const today = new Date();
                const y = today.getFullYear();
                const m = String(today.getMonth() + 1).padStart(2, '0');
                const d = String(today.getDate()).padStart(2, '0');
                $('#datePicker').val(`${y}-${m}-${d}`);
            }
            setDefaultDate();

            // ---------- Toast ----------
            function showToast(message, type = 'success') {
                const $toast = $('#copyToast');
                $toast.removeClass('show success error');
                $toast.addClass(type);
                $toast.find('.toast-message').text(message);
                $toast.find('.toast-icon').text(type === 'success' ? '✅' : '❌');
                void $toast[0].offsetWidth;
                $toast.addClass('show');
                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    $toast.removeClass('show');
                }, 3000);
            }

            // ---------- Tooltip ----------
            const $tooltip = $('#statTooltip');
            function updateTooltipPosition(e) {
                const tw = $tooltip.outerWidth(), th = $tooltip.outerHeight();
                const ww = $(window).width(), wh = $(window).height();
                let left = e.clientX + 15, top = e.clientY + 15;
                if (left + tw > ww - 10) left = e.clientX - tw - 15;
                if (left < 10) left = 10;
                if (top + th > wh - 10) top = e.clientY - th - 15;
                if (top < 10) top = 10;
                $tooltip.css({ left, top });
            }

            // Shift breakdown using the Shift column from backend
            function getShiftProcessBreakdown(filterValue) {
                const ds = {}, ns = {};
                let dsTotal = 0, nsTotal = 0;
                allData.forEach(row => {
                    const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                    let match = false;
                    if (filterValue === 'STOP') match = (alarm === 'STOP');
                    else if (filterValue === 'Check L2') match = (alarm.includes('L2') || alarm === 'CHECK L2');
                    else if (filterValue === 'Check L1') match = (alarm.includes('L1') || alarm === 'CHECK L1');
                    else if (filterValue === 'all') match = true;

                    if (match) {
                        const proc = (dcpProcessMap[row['DCP Name']] || 'Unknown').trim();
                        const shift = (row['Shift'] || '').toString().toUpperCase(); // 'DS' or 'NS'
                        if (shift === 'DS') {
                            ds[proc] = (ds[proc] || 0) + 1;
                            dsTotal++;
                        } else if (shift === 'NS') {
                            ns[proc] = (ns[proc] || 0) + 1;
                            nsTotal++;
                        }
                    }
                });
                return { ds, ns, dsTotal, nsTotal };
            }

            // Tooltip hover event
            $(document).on('mouseenter', '.stat-card', function (e) {
                const $card = $(this);
                const filter = $card.data('filter');
                const value = $card.data('value');
                let title = '';
                if (filter === 'all') title = 'Total Alarms';
                else if (value === 'STOP') title = 'Stop Alarms';
                else if (value === 'Check L2') title = 'Check L2 Alarms';
                else if (value === 'Check L1') title = 'Check L1 Alarms';
                else return;

                const filterValue = filter === 'all' ? 'all' : value;
                const { ds, ns, dsTotal, nsTotal } = getShiftProcessBreakdown(filterValue);

                let formattedDate = '';
                const dateVal = $('#datePicker').val();
                if (dateVal) {
                    const parts = dateVal.split('-');
                    if (parts.length === 3) {
                        const month = parseInt(parts[1], 10);
                        const day = parseInt(parts[2], 10);
                        const year = parts[0];
                        formattedDate = `${month}-${day}-${year}`;
                    }
                }

                let html = `<h4 style="text-align:center;">${title}: ${formattedDate}</h4>`;
                html += '<div style="display:flex; gap:16px;">';

                // Day Shift column
                html += '<div style="flex:1;">';
                html += '<strong>☀️ Day Shift</strong>';
                const dsProcs = Object.keys(ds).sort();
                if (dsProcs.length === 0) {
                    html += '<div class="process-item"><span class="process-name">No data</span></div>';
                } else {
                    dsProcs.forEach(proc => {
                        html += `<div class="process-item"><span class="process-name">${proc}</span><span class="process-count">${ds[proc]}</span></div>`;
                    });
                }
                html += `<div class="total-row"><span class="total-label">Total</span><span class="total-value">${dsTotal}</span></div>`;
                html += '</div>';

                // Night Shift column
                html += '<div style="flex:1;">';
                html += '<strong>🌙 Night Shift</strong>';
                const nsProcs = Object.keys(ns).sort();
                if (nsProcs.length === 0) {
                    html += '<div class="process-item"><span class="process-name">No data</span></div>';
                } else {
                    nsProcs.forEach(proc => {
                        html += `<div class="process-item"><span class="process-name">${proc}</span><span class="process-count">${ns[proc]}</span></div>`;
                    });
                }
                html += `<div class="total-row"><span class="total-label">Total</span><span class="total-value">${nsTotal}</span></div>`;
                html += '</div>';

                html += '</div>';
                $tooltip.html(html).css({ display: 'block' });
                updateTooltipPosition(e);
            });
            $(document).on('mousemove', '.stat-card', updateTooltipPosition);
            $(document).on('mouseleave', '.stat-card', () => $tooltip.css('display', 'none'));

            // ---------- Badge helper ----------
            function getBadgeClass(alarmText) {
                if (!alarmText) return 'badge-other';
                const text = alarmText.toString().trim().toUpperCase();
                if (text.includes('L1') || text === 'CHECK L1') return 'badge-l1';
                if (text.includes('L2') || text === 'CHECK L2') return 'badge-l2';
                if (text === 'STOP') return 'badge-stop';
                return 'badge-other';
            }

            // Format datetime 12h
            function formatDateTime12h(dateTimeStr) {
                if (!dateTimeStr) return '';
                let date;
                if (/^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}$/.test(dateTimeStr)) {
                    const parts = dateTimeStr.split(' ');
                    const dParts = parts[0].split('/');
                    const tParts = parts[1].split(':');
                    date = new Date(parseInt(dParts[2]), parseInt(dParts[1]) - 1, parseInt(dParts[0]), parseInt(tParts[0]), parseInt(tParts[1]));
                } else if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(dateTimeStr)) {
                    date = new Date(dateTimeStr.replace(' ', 'T'));
                } else {
                    return dateTimeStr;
                }
                if (isNaN(date.getTime())) return dateTimeStr;
                return date.toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true, month: 'numeric', day: 'numeric', year: 'numeric' });
            }

            // ---------- Inventory loading → Process map ----------
            function loadInventory() {
                $.getJSON('/api/data').done(resp => {
                    const flat = [];
                    for (let key in resp) {
                        const val = resp[key];
                        if (Array.isArray(val)) flat.push(...val);
                        else if (val.id) flat.push(val);
                    }
                    flat.forEach(item => { dcpProcessMap[item.id] = item.process || ''; });
                    populateProcessFilter();
                }).fail(() => console.warn('Could not load inventory data'));
            }

            function populateProcessFilter() {
                const uniqueProcesses = [...new Set(Object.values(dcpProcessMap).filter(Boolean))].sort();
                const sel = $('#filterProcess');
                sel.empty().append('<option value="all">All Processes</option>');
                uniqueProcesses.forEach(p => sel.append(`<option value="${p}">${p}</option>`));
            }

            // ---------- Data loading (date only) ----------
            function loadDataByDate() {
                const dateVal = $('#datePicker').val();
                if (!dateVal) {
                    showToast('Please select a date', 'error');
                    return;
                }

                $('#cardsSection').addClass('hidden');
                $('#tableWrapper').addClass('hidden');
                $('#emptyIndicator').addClass('hidden');
                $('#loadingIndicator').removeClass('hidden');
                $('#errorIndicator').addClass('hidden');
                $('#recordCount').text('');

                $.getJSON(`/api/archive/data_by_date/${dateVal}`)
                    .done(response => {
                        $('#loadingIndicator').addClass('hidden');
                        if (response.error) {
                            $('#errorIndicator').removeClass('hidden').text('Error: ' + response.error);
                            showToast('Error: ' + response.error, 'error');
                            return;
                        }

                        allData = response.data;
                        if (allData.length === 0) {
                            $('#emptyIndicator').removeClass('hidden').text('No data for this date');
                            showToast('No data found', 'error');
                            return;
                        }

                        $('#cardsSection').removeClass('hidden');
                        $('#tableWrapper').removeClass('hidden');

                        // reset filters
                        activeStatusFilter = 'all';
                        tableSearchTerm = '';
                        activeProcessFilter = 'all';
                        activeShiftFilter = 'all';
                        $('#tableSearch').val('');
                        $('#filterProcess').val('all');
                        $('#filterShift').val('all');
                        $('.stat-card').removeClass('active');
                        $('#cardTotal').addClass('active');

                        applyFilters();
                    })
                    .fail(xhr => {
                        $('#loadingIndicator').addClass('hidden');
                        let msg = 'Failed to load data';
                        if (xhr.responseJSON?.error) msg = xhr.responseJSON.error;
                        $('#errorIndicator').removeClass('hidden').text('Error: ' + msg);
                        showToast('Error: ' + msg, 'error');
                    });
            }

            // ---------- Card stats ----------
            function calculateStats() {
                let total = allData.length;
                let l1 = 0, l2 = 0, stop = 0;
                allData.forEach(row => {
                    const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                    if (alarm.includes('L1') || alarm === 'CHECK L1') l1++;
                    else if (alarm.includes('L2') || alarm === 'CHECK L2') l2++;
                    else if (alarm === 'STOP') stop++;
                });
                $('#textTotal').text(total);
                $('#textL1').text(l1);
                $('#textL2').text(l2);
                $('#textStop').text(stop);
            }

            // ---------- Apply filters ----------
            function applyFilters() {
                filteredData = allData.filter(row => {
                    const id = (row['DCP Name'] || '').toString();
                    const desc = (row['Description'] || '').toString();
                    const matchSearch = !tableSearchTerm ||
                        id.toLowerCase().includes(tableSearchTerm) ||
                        desc.toLowerCase().includes(tableSearchTerm);

                    // Status filter
                    let matchStatus = true;
                    if (activeStatusFilter !== 'all') {
                        const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                        if (activeStatusFilter === 'STOP') matchStatus = (alarm === 'STOP');
                        else if (activeStatusFilter === 'Check L2') matchStatus = alarm.includes('L2') || alarm === 'CHECK L2';
                        else if (activeStatusFilter === 'Check L1') matchStatus = alarm.includes('L1') || alarm === 'CHECK L1';
                    }

                    // Process filter
                    let matchProcess = true;
                    if (activeProcessFilter !== 'all') {
                        const dcpName = row['DCP Name'] || '';
                        const proc = dcpProcessMap[dcpName] || '';
                        matchProcess = (proc === activeProcessFilter);
                    }

                    // Shift filter
                    let matchShift = true;
                    if (activeShiftFilter !== 'all') {
                        const shift = (row['Shift'] || '').toString().toUpperCase();
                        matchShift = (shift === activeShiftFilter);
                    }

                    return matchSearch && matchStatus && matchProcess && matchShift;
                });

                // Sort by Date_Time
                filteredData.sort((a, b) => {
                    const dateA = parseDateTime(a['Date_Time']);
                    const dateB = parseDateTime(b['Date_Time']);
                    if (dateA < dateB) return dateSortOrder === 'asc' ? -1 : 1;
                    if (dateA > dateB) return dateSortOrder === 'asc' ? 1 : -1;
                    return 0;
                });

                calculateStats();
                currentPage = 1;
                renderTable();
            }

            // ---------- Render table ----------
            function renderTable() {
                const thead = $('#tableHead');
                const tbody = $('#tableBody');
                const start = (currentPage - 1) * pageSize;
                const end = start + pageSize;
                const pageData = filteredData.slice(start, end);

                const columns = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st Data', '2nd Data', '3rd Data', '4th Data', '5th Data', 'Average Data'];

                let headerRow = '<tr>';
                columns.forEach(col => headerRow += `<th class="px-4 py-3 text-left">${col}</th>`);
                headerRow += '</tr>';
                thead.html(headerRow);

                tbody.empty();
                if (pageData.length === 0) {
                    tbody.append('<tr><td colspan="10" class="text-center py-4 text-gray-500">No matching records</td></tr>');
                } else {
                    pageData.forEach(row => {
                        const alarmText = row['Alarm Code'] || '';
                        const badgeClass = getBadgeClass(alarmText);
                        const getVal = (key) => (row[key] != null) ? row[key] : '';
                        let tr = '<tr class="hover:bg-blue-50">';
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm">${formatDateTime12h(getVal('Date_Time'))}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm font-mono font-bold text-blue-700">${getVal('DCP Name')}</td>`;
                        tr += `<td class="px-4 py-2 text-sm max-w-xs truncate" title="${getVal('Description')}">${getVal('Description')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm"><span class="px-3 py-1 inline-flex text-xs leading-5 font-bold rounded-md status-badge ${badgeClass}">${alarmText}</span></td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('1st Data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('2nd Data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('3rd Data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('4th Data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('5th Data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center font-semibold">${getVal('Average Data')}</td>`;
                        tr += '</tr>';
                        tbody.append(tr);
                    });
                }

                updatePagination();
                $('#recordCount').text(`${filteredData.length} rows (filtered)`);
            }

            function updatePagination() {
                const total = filteredData.length;
                const start = total === 0 ? 0 : (currentPage - 1) * pageSize + 1;
                const end = Math.min(currentPage * pageSize, total);
                $('#showingStart').text(start);
                $('#showingEnd').text(end);
                $('#totalEntries').text(total);
                const totalPages = Math.ceil(total / pageSize) || 1;
                $('#pageInfo').text(`Page ${currentPage} of ${totalPages}`);
                $('#prevPage').prop('disabled', currentPage === 1);
                $('#nextPage').prop('disabled', currentPage >= totalPages);
            }

            // ---------- Copy table (TSV) ----------
            function copyTableAsTSV() {
                if (filteredData.length === 0) {
                    showToast('No data to copy', 'error');
                    return;
                }
                const headers = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st Data', '2nd Data', '3rd Data', '4th Data', '5th Data', 'Average Data'];
                let tsv = headers.join('\t') + '\n';
                filteredData.forEach(row => {
                    const values = [
                        formatDateTime12h(row['Date_Time']),
                        row['DCP Name'] ?? '',
                        row['Description'] ?? '',
                        row['Alarm Code'] ?? '',
                        row['1st Data'] ?? '',
                        row['2nd Data'] ?? '',
                        row['3rd Data'] ?? '',
                        row['4th Data'] ?? '',
                        row['5th Data'] ?? '',
                        row['Average Data'] ?? ''
                    ];
                    tsv += values.join('\t') + '\n';
                });
                navigator.clipboard.writeText(tsv).then(() => showToast('Table copied (TSV)', 'success'))
                    .catch(() => showToast('Copy failed', 'error'));
            }

            // ---------- Export CSV ----------
            function exportToCSV() {
                if (filteredData.length === 0) {
                    showToast('No data to export', 'error');
                    return;
                }
                const headers = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st Data', '2nd Data', '3rd Data', '4th Data', '5th Data', 'Average Data'];
                let csv = headers.join(',') + '\n';
                filteredData.forEach(row => {
                    const values = [
                        `"${formatDateTime12h(row['Date_Time']).replace(/"/g, '""')}"`,
                        `"${(row['DCP Name'] ?? '').replace(/"/g, '""')}"`,
                        `"${(row['Description'] ?? '').replace(/"/g, '""')}"`,
                        `"${(row['Alarm Code'] ?? '').replace(/"/g, '""')}"`,
                        row['1st Data'] ?? '',
                        row['2nd Data'] ?? '',
                        row['3rd Data'] ?? '',
                        row['4th Data'] ?? '',
                        row['5th Data'] ?? '',
                        row['Average Data'] ?? ''
                    ];
                    csv += values.join(',') + '\n';
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `LMS_export_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('CSV exported', 'success');
            }

            // ---------- Event bindings ----------
            $('#loadRangeBtn').click(loadDataByDate);

            $('#tableSearch').on('input', function () {
                tableSearchTerm = $(this).val().trim().toLowerCase();
                applyFilters();
            });

            $('#sortOrder').change(function () {
                dateSortOrder = $(this).val();
                applyFilters();
            });

            $('#filterProcess').change(function () {
                activeProcessFilter = $(this).val();
                applyFilters();
            });

            $('#filterShift').change(function () {
                activeShiftFilter = $(this).val();
                applyFilters();
            });

            $('#pageSize').change(function () {
                pageSize = parseInt($(this).val());
                currentPage = 1;
                renderTable();
            });

            $('#prevPage').click(() => { if (currentPage > 1) { currentPage--; renderTable(); } });
            $('#nextPage').click(() => {
                const totalPages = Math.ceil(filteredData.length / pageSize);
                if (currentPage < totalPages) { currentPage++; renderTable(); }
            });

            // Card filtering (status)
            $('.stat-card').click(function () {
                const filterType = $(this).data('filter');
                const filterValue = $(this).data('value');
                $('.stat-card').removeClass('active');
                $(this).addClass('active');
                if (filterType === 'all') {
                    activeStatusFilter = 'all';
                } else {
                    activeStatusFilter = filterValue;
                }
                applyFilters();
            });

            $('#copyTableBtn').on('click', copyTableAsTSV);
            $('#exportCsvBtn').on('click', exportToCSV);

            // Initialise inventory map and populate process filter
            loadInventory();
        });
    </script>
</body>

</html>
