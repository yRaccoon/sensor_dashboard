<html lang="en">

<head>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {

                    }

    <style>
        body {
            background-color: #f8f9fa;
        }

        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .stat-card.active {
            box-shadow: 0 0 0 2px #dc2626;
        }

        /* Tooltip Styles */
        .stat-tooltip {
            position: fixed;
            background: white;
            border: 1px solid #e5e7eb;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #111827;
            pointer-events: none;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-left: 3px solid #dc2626;
            max-width: 340px;
            min-width: 280px;
        }

        .stat-tooltip h4 {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 4px;
        }

        .stat-tooltip .process-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }

        .stat-tooltip .process-name {
            font-weight: 500;
            color: #374151;
        }

        .stat-tooltip .process-count {
            font-weight: 600;
            color: #dc2626;
        }

        .stat-tooltip .total-row {
            border-top: 1px solid #e5e7eb;
            margin-top: 6px;
            padding-top: 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .stat-tooltip .total-label {
            font-weight: 700;
            color: #111827;
        }

        .stat-tooltip .total-value {
            font-weight: 800;
            color: #dc2626;
            font-size: 1rem;
        }

        .table-container {
            border: 1px solid #dbeafe;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-header th {
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 100%);
            border-bottom: 2px solid #bfdbfe;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            color: #1e40af;
            padding: 14px 16px;
        }

        tbody tr:nth-child(even) {
            background-color: #f0f9ff;
        }

        tbody tr:nth-child(odd) {
            background-color: #f8fafc;
        }

        tbody tr:hover {
            background-color: #e0f2fe !important;
            cursor: pointer;
        }

        .status-badge {
            font-weight: 600;
        }

        .badge-l1 {
            background: #fef9c3;
            color: #854d0e;
            border-left: 3px solid #eab308;
        }

        .badge-l2 {
            background: #ffedd5;
            color: #9a3412;
            border-left: 3px solid #f97316;
        }

        .badge-stop {
            background: #fee2e2;
            color: #991b1b;
            border-left: 3px solid #ef4444;
        }

        .badge-other {
            background: #f3f4f6;
            color: #374151;
            border-left: 3px solid #6b7280;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid #22c55e;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast-icon {
            font-size: 1.2rem;
        }

        .toast-message {
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>

    <script>
        $(document).ready(function () {
            // State
            let allData = [];
            let filteredData = [];
            let currentPage = 1;
            let pageSize = 10;
            let activeStatusFilter = 'all';
            let tableSearchTerm = '';
let dateSortOrder = 'asc';   // 'asc' or 'desc'
            // Set default datetime range (yesterday 7am to today 7am)
            function setDefaultDateTime() {
                const now = new Date();
                const today7am = new Date(now);
                today7am.setHours(7, 0, 0, 0);

                const yesterday7am = new Date(today7am);
                yesterday7am.setDate(yesterday7am.getDate() - 1);

                const format = (d) => {
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const hours = String(d.getHours()).padStart(2, '0');
                    const minutes = String(d.getMinutes()).padStart(2, '0');
                    return `${year}-${month}-${day}T${hours}:${minutes}`;
                };

                $('#dateStart').val(format(yesterday7am));
                $('#dateEnd').val(format(today7am));
            }
            setDefaultDateTime();

            // Toast helper
            function showToast(message, type = 'success') {
                const $toast = $('#copyToast');
                $toast.removeClass('show success error');
                $toast.addClass(type);
                $toast.find('.toast-message').text(message);
                $toast.find('.toast-icon').text(type === 'success' ? '✅' : '❌');

                void $toast[0].offsetWidth; // reflow
                $toast.addClass('show');

                clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(() => {
                    $toast.removeClass('show');
                }, 3000);
            }

            // Tooltip helpers
            const $tooltip = $('#statTooltip');
            function updateTooltipPosition(e) {
                const tw = $tooltip.outerWidth(), th = $tooltip.outerHeight();
                const ww = $(window).width(), wh = $(window).height();
                let left = e.clientX + 15, top = e.clientY + 15;
                if (left + tw > ww - 10) left = e.clientX - tw - 15;
                if (left < 10) left = 10;
                if (top + th > wh - 10) top = e.clientY - th - 15;
                if (top < 10) top = 10;
                $tooltip.css({ left, top });
            }

            function getProcessBreakdown(filterValue) {
                const counts = {};
                let total = 0;
                allData.forEach(row => {
                    const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                    let match = false;
                    if (filterValue === 'STOP') match = (alarm === 'STOP');
                    else if (filterValue === 'Check L2') match = (alarm.includes('L2') || alarm === 'CHECK L2');
                    else if (filterValue === 'Check L1') match = (alarm.includes('L1') || alarm === 'CHECK L1');
                    else if (filterValue === 'all') match = true;
                    if (match) {
                        const proc = row['Process'] || 'Unknown';
                        counts[proc] = (counts[proc] || 0) + 1;
                        total++;
                    }
                });
                return { counts, total };
            }

            $(document).on('mouseenter', '.stat-card', function (e) {
                const $card = $(this);
                const filter = $card.data('filter');
                const value = $card.data('value');
                let title = '';
                if (filter === 'all') title = 'Total Alarms';
                else if (value === 'STOP') title = 'Stop Alarms';
                else if (value === 'Check L2') title = 'Check L2 Alarms';
                else if (value === 'Check L1') title = 'Check L1 Alarms';
                else return;

                const filterValue = filter === 'all' ? 'all' : value;
                const { counts, total } = getProcessBreakdown(filterValue);
                let html = `<h4>${title} by Process</h4>`;
                const sorted = Object.keys(counts).sort();
                if (sorted.length === 0) {
                    html += '<div class="process-item"><span class="process-name">No data</span><span class="process-count">0</span></div>';
                } else {
                    sorted.forEach(proc => {
                        html += `<div class="process-item"><span class="process-name">${proc}</span><span class="process-count">${counts[proc]}</span></div>`;
                    });
                }
                html += `<div class="total-row"><span class="total-label">📋 TOTAL</span><span class="total-value">${total}</span></div>`;
                $tooltip.html(html).css({ display: 'block' });
                updateTooltipPosition(e);
            });

            $(document).on('mousemove', '.stat-card', updateTooltipPosition);
            $(document).on('mouseleave', '.stat-card', () => $tooltip.css('display', 'none'));

            // Helper: get badge class based on alarm text
            function getBadgeClass(alarmText) {
                if (!alarmText) return 'badge-other';
                const text = alarmText.toString().trim().toUpperCase();
                if (text.includes('L1') || text === 'CHECK L1') return 'badge-l1';
                if (text.includes('L2') || text === 'CHECK L2') return 'badge-l2';
                if (text === 'STOP') return 'badge-stop';
                return 'badge-other';
            }

            // Format datetime to 12-hour with AM/PM
            function formatDateTime12h(dateTimeStr) {
                if (!dateTimeStr) return '';
                let date;
                if (/^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}$/.test(dateTimeStr)) {
                    const parts = dateTimeStr.split(' ');
                    const dParts = parts[0].split('/');
                    const tParts = parts[1].split(':');
                    date = new Date(parseInt(dParts[2]), parseInt(dParts[1]) - 1, parseInt(dParts[0]), parseInt(tParts[0]), parseInt(tParts[1]));
                }
                else if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(dateTimeStr)) {
                    date = new Date(dateTimeStr.replace(' ', 'T'));
                }
                else {
                    return dateTimeStr;
                }
                if (isNaN(date.getTime())) return dateTimeStr;
                return date.toLocaleString('en-US', { hour: 'numeric', minute: 'numeric', hour12: true, month: 'numeric', day: 'numeric', year: 'numeric' });
            }

            // Load data by range
            function loadDataByRange() {
                const start = $('#dateStart').val();
                const end = $('#dateEnd').val();
                if (!start || !end) {
                    showToast('Please select both start and end datetime', 'error');
                    return;
                }

                $('#cardsSection').addClass('hidden');
                $('#tableWrapper').addClass('hidden');
                $('#emptyIndicator').addClass('hidden');
                $('#loadingIndicator').removeClass('hidden');
                $('#errorIndicator').addClass('hidden');
                $('#recordCount').text('');

                $.getJSON('/api/archive/data_by_range', { start: start, end: end })
                    .done(response => {
                        $('#loadingIndicator').addClass('hidden');
                        if (response.error) {
                            $('#errorIndicator').removeClass('hidden').text('Error: ' + response.error);
                            showToast('Error: ' + response.error, 'error');
                            return;
                        }

                        allData = response.data;
                        if (allData.length === 0) {
                            $('#emptyIndicator').removeClass('hidden').text('No data in selected range');
                            showToast('No data in selected range', 'error');
                            return;
                        }

                        $('#cardsSection').removeClass('hidden');
                        $('#tableWrapper').removeClass('hidden');

                        // Reset filters
                        activeStatusFilter = 'all';
                        tableSearchTerm = '';
                        $('#tableSearch').val('');
                        $('.stat-card').removeClass('active');
                        $('#cardTotal').addClass('active');

                        applyFilters();
                    })
                    .fail(xhr => {
                        $('#loadingIndicator').addClass('hidden');
                        let msg = 'Failed to load data';
                        if (xhr.responseJSON?.error) msg = xhr.responseJSON.error;
                        $('#errorIndicator').removeClass('hidden').text('Error: ' + msg);
                        showToast('Error: ' + msg, 'error');
                    });
            }

            // Calculate card stats
            function calculateStats() {
                let total = allData.length;
                let l1 = 0, l2 = 0, stop = 0;
                allData.forEach(row => {
                    const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                    if (alarm.includes('L1') || alarm === 'CHECK L1') l1++;
                    else if (alarm.includes('L2') || alarm === 'CHECK L2') l2++;
                    else if (alarm === 'STOP') stop++;
                });
                $('#textTotal').text(total);
                $('#textL1').text(l1);
                $('#textL2').text(l2);
                $('#textStop').text(stop);
            }

function parseDateTime(dateTimeStr) {
    if (!dateTimeStr) return new Date(0); // epoch for empty
    // Try dd/mm/yyyy HH:MM
    if (/^\d{2}\/\d{2}\/\d{4} \d{2}:\d{2}$/.test(dateTimeStr)) {
        const parts = dateTimeStr.split(' ');
        const dParts = parts[0].split('/');
        const tParts = parts[1].split(':');
        return new Date(parseInt(dParts[2]), parseInt(dParts[1]) - 1, parseInt(dParts[0]), parseInt(tParts[0]), parseInt(tParts[1]));
    }
    // Try yyyy-mm-dd HH:MM:SS
    if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(dateTimeStr)) {
        return new Date(dateTimeStr.replace(' ', 'T'));
    }
    return new Date(dateTimeStr); // fallback
}
            // Apply filters
            function applyFilters() {
                filteredData = allData.filter(row => {
                    const id = (row['DCP Name'] || '').toString();
                    const desc = (row['Description'] || '').toString();
                    const matchSearch = !tableSearchTerm ||
                        id.toLowerCase().includes(tableSearchTerm) ||
                        desc.toLowerCase().includes(tableSearchTerm);

                    let matchStatus = true;
                    if (activeStatusFilter !== 'all') {
                        const alarm = (row['Alarm Code'] || '').toString().trim().toUpperCase();
                        if (activeStatusFilter === 'STOP') {
                            matchStatus = (alarm === 'STOP');
                        } else if (activeStatusFilter === 'Check L2') {
                            matchStatus = alarm.includes('L2') || alarm === 'CHECK L2';
                        } else if (activeStatusFilter === 'Check L1') {
                            matchStatus = alarm.includes('L1') || alarm === 'CHECK L1';
                        }
                    }
                    return matchSearch && matchStatus;
                });
    // Sort by Date_Time
    filteredData.sort((a, b) => {
        const dateA = parseDateTime(a['Date_Time']);
        const dateB = parseDateTime(b['Date_Time']);
        if (dateA < dateB) return dateSortOrder === 'asc' ? -1 : 1;
        if (dateA > dateB) return dateSortOrder === 'asc' ? 1 : -1;
        return 0;
    });
                calculateStats();
                currentPage = 1;
                renderTable();
            }

            // Render table - Alarm Code now right after Description
            function renderTable() {
                const thead = $('#tableHead');
                const tbody = $('#tableBody');
                const start = (currentPage - 1) * pageSize;
                const end = start + pageSize;
                const pageData = filteredData.slice(start, end);

                const columns = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st data', '2nd data', '3rd data', '4th data', '5th data', 'Average Data'];

                let headerRow = '<tr>';
                columns.forEach(col => headerRow += `<th class="px-4 py-3 text-left">${col}</th>`);
                headerRow += '</tr>';
                thead.html(headerRow);

                tbody.empty();
                if (pageData.length === 0) {
                    tbody.append('<tr><td colspan="10" class="text-center py-4 text-gray-500">No matching records</td></tr>');
                } else {
                    pageData.forEach(row => {
                        const alarmText = row['Alarm Code'] || '';
                        const badgeClass = getBadgeClass(alarmText);
                        const getVal = (key) => (row[key] != null) ? row[key] : '';

                        let tr = '<tr class="hover:bg-blue-50">';
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm">${formatDateTime12h(getVal('Date_Time'))}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm font-mono font-bold text-blue-700">${getVal('DCP Name')}</td>`;
                        tr += `<td class="px-4 py-2 text-sm max-w-xs truncate" title="${getVal('Description')}">${getVal('Description')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm"><span class="px-3 py-1 inline-flex text-xs leading-5 font-bold rounded-md status-badge ${badgeClass}">${alarmText}</span></td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('1st data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('2nd data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('3rd data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('4th data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center">${getVal('5th data')}</td>`;
                        tr += `<td class="px-4 py-2 whitespace-nowrap text-sm text-center font-semibold">${getVal('Average Data')}</td>`;
                        tr += '</tr>';
                        tbody.append(tr);
                    });
                }

                updatePagination();
                $('#recordCount').text(`${filteredData.length} rows (filtered)`);
            }

            function updatePagination() {
                const total = filteredData.length;
                const start = total === 0 ? 0 : (currentPage - 1) * pageSize + 1;
                const end = Math.min(currentPage * pageSize, total);
                $('#showingStart').text(start);
                $('#showingEnd').text(end);
                $('#totalEntries').text(total);
                const totalPages = Math.ceil(total / pageSize) || 1;
                $('#pageInfo').text(`Page ${currentPage} of ${totalPages}`);
                $('#prevPage').prop('disabled', currentPage === 1);
                $('#nextPage').prop('disabled', currentPage >= totalPages);
            }

            // Copy Table (TSV)
            function copyTableAsTSV() {
                if (filteredData.length === 0) {
                    showToast('No data to copy', 'error');
                    return;
                }

                const headers = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st data', '2nd data', '3rd data', '4th data', '5th data', 'Average Data'];

                let tsv = headers.join('\t') + '\n';

                filteredData.forEach(row => {
                    const values = [
                        formatDateTime12h(row['Date_Time']),
                        row['DCP Name'] ?? '',
                        row['Description'] ?? '',
                        row['Alarm Code'] ?? '',
                        row['1st data'] ?? '',
                        row['2nd data'] ?? '',
                        row['3rd data'] ?? '',
                        row['4th data'] ?? '',
                        row['5th data'] ?? '',
                        row['Average Data'] ?? ''
                    ];
                    tsv += values.join('\t') + '\n';
                });

                navigator.clipboard.writeText(tsv).then(() => {
                    showToast('Table copied to clipboard (TSV)', 'success');
                }).catch(() => {
                    showToast('Copy failed. Check permissions.', 'error');
                });
            }

            // Export CSV
            function exportToCSV() {
                if (filteredData.length === 0) {
                    showToast('No data to export', 'error');
                    return;
                }

                const headers = ['Date_Time', 'DCP Name', 'Description', 'Alarm Code', '1st data', '2nd data', '3rd data', '4th data', '5th data', 'Average Data'];
                let csv = headers.join(',') + '\n';

                filteredData.forEach(row => {
                    const values = [
                        `"${formatDateTime12h(row['Date_Time']).replace(/"/g, '""')}"`,
                        `"${(row['DCP Name'] ?? '').replace(/"/g, '""')}"`,
                        `"${(row['Description'] ?? '').replace(/"/g, '""')}"`,
                        `"${(row['Alarm Code'] ?? '').replace(/"/g, '""')}"`,
                        row['1st data'] ?? '',
                        row['2nd data'] ?? '',
                        row['3rd data'] ?? '',
                        row['4th data'] ?? '',
                        row['5th data'] ?? '',
                        row['Average Data'] ?? ''
                    ];
                    csv += values.join(',') + '\n';
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `LMS_export_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                showToast('CSV exported successfully', 'success');
            }

            // Event Handlers
            $('#loadRangeBtn').click(loadDataByRange);

$('#sortOrder').change(function () {
    dateSortOrder = $(this).val();
    applyFilters();
});

            $('#tableSearch').on('input', function () {
                tableSearchTerm = $(this).val().trim().toLowerCase();
                applyFilters();
            });

            $('#pageSize').change(function () {
                pageSize = parseInt($(this).val());
                currentPage = 1;
                renderTable();
            });

            $('#prevPage').click(() => { if (currentPage > 1) { currentPage--; renderTable(); } });
            $('#nextPage').click(() => {
                const totalPages = Math.ceil(filteredData.length / pageSize);
                if (currentPage < totalPages) { currentPage++; renderTable(); }
            });

            // Card filtering
            $('.stat-card').click(function () {
                const filterType = $(this).data('filter');
                const filterValue = $(this).data('value');

                $('.stat-card').removeClass('active');
                $(this).addClass('active');

                if (filterType === 'all') {
                    activeStatusFilter = 'all';
                } else {
                    activeStatusFilter = filterValue;
                }
                applyFilters();
            });

            // Copy and Export buttons
            $('#copyTableBtn').on('click', copyTableAsTSV);
            $('#exportCsvBtn').on('click', exportToCSV);
        });
    </script>
</body>
